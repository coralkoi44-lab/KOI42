<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #FFB84E;
      --charcoal: #1B1A1B;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--orange);
      color: var(--charcoal);
      font-family: "Plus Jakarta Sans", sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.aesthetic-mode {
      background: var(--charcoal);
      color: var(--orange);
    }

    button {
      background: transparent;
      color: inherit;
      border: 2px solid currentColor;
      padding: 12px 18px;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-1px);
    }

    #aestheticButton {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 50;
      background: inherit;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 24px 80px;
    }

    h1 {
      font-size: clamp(48px, 10vw, 120px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: -0.06em;
    }

    p {
      margin-top: 24px;
      font-family: "Space Mono", monospace;
      font-size: clamp(16px, 2vw, 24px);
    }

    .game-section {
      min-height: 100vh;
      padding: 110px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 0 currentColor;
      overflow: hidden;
    }

    .game-section h2 {
      font-size: clamp(40px, 8vw, 96px);
      margin: 0 0 24px;
      letter-spacing: -0.05em;
    }

    .game-wrap {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-board {
      position: relative;
    }

    .game-board.impact-small {
      animation: impactSmall 0.16s ease;
    }

    .game-board.impact-big {
      animation: impactBig 0.24s ease;
    }

    @keyframes impactSmall {
      0% { transform: translateY(0); }
      35% { transform: translateY(5px); }
      65% { transform: translateY(-2px); }
      100% { transform: translateY(0); }
    }

    @keyframes impactBig {
      0% { transform: translate(0, 0) rotate(0deg); }
      20% { transform: translate(-4px, 7px) rotate(-1deg); }
      40% { transform: translate(5px, -3px) rotate(1deg); }
      65% { transform: translate(-2px, 4px) rotate(-0.5deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    canvas {
      display: block;
      border: 3px solid currentColor;
      background: rgba(255, 255, 255, 0.08);
    }

    .overlay {
      position: absolute;
      inset: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: color-mix(in srgb, currentColor 12%, transparent);
      backdrop-filter: blur(2px);
      padding: 20px;
      z-index: 5;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      background: var(--orange);
      color: var(--charcoal);
      border: 2px solid currentColor;
      padding: 22px;
      max-width: 200px;
    }

    body.aesthetic-mode .overlay-box {
      background: var(--charcoal);
      color: var(--orange);
    }

    .overlay-title {
      font-size: 28px;
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .overlay-text {
      font-family: "Space Mono", monospace;
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .panel {
      font-family: "Space Mono", monospace;
      font-size: 16px;
      max-width: 260px;
      line-height: 1.5;
    }

    .score {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 34px;
      margin-bottom: 20px;
    }

    .side-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls-modal {
      position: fixed;
      inset: 0;
      background: color-mix(in srgb, currentColor 18%, transparent);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
    }

    .controls-modal.hidden {
      display: none;
    }

    .controls-box {
      background: var(--orange);
      color: var(--charcoal);
      border: 2px solid currentColor;
      padding: 28px;
      max-width: 360px;
      width: 100%;
    }

    body.aesthetic-mode .controls-box {
      background: var(--charcoal);
      color: var(--orange);
    }

    .controls-box h3 {
      margin: 0 0 16px;
      font-size: 36px;
      letter-spacing: -0.05em;
    }

    .controls-box p {
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 20px;
    }
  </style>
</head>

<body>
  <button id="aestheticButton">AESTHETICS</button>

  <section class="hero">
    <main>
      <h1>welcome to my website</h1>
      <p>yup this is it the website.</p>
    </main>
  </section>

  <section class="game-section" id="gameSection">
    <h2>tetris zone</h2>

    <div class="game-wrap">
      <div class="game-board" id="gameBoard">
        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="overlay" id="startScreen">
          <div class="overlay-box">
            <div class="overlay-title">ready?</div>
            <div class="overlay-text">click begin game to start</div>
            <button id="beginButton">BEGIN GAME</button>
          </div>
        </div>

        <div class="overlay hidden" id="gameOverScreen">
          <div class="overlay-box">
            <div class="overlay-title">game over</div>
            <div class="overlay-text">the blocks have won. tragic.</div>
            <button id="playAgainButton">PLAY AGAIN</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="score">score: <span id="score">0</span></div>

        <div class="side-buttons">
          <button id="controlsButton">CONTROLS</button>
          <button id="fullscreenButton">FULLSCREEN</button>
          <button id="restartButton">RESTART</button>
        </div>
      </div>
    </div>
  </section>

  <div class="controls-modal hidden" id="controlsModal">
    <div class="controls-box">
      <h3>controls</h3>
      <p>
        ← → move<br>
        ↓ soft drop<br>
        ↑ rotate<br>
        space hard drop<br>
        R restart<br>
        ESC close this screen
      </p>
      <button id="closeControlsButton">CLOSE</button>
    </div>
  </div>

  <script>
    const aestheticButton = document.getElementById("aestheticButton");
    const gameBoard = document.getElementById("gameBoard");
    const gameSection = document.getElementById("gameSection");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const beginButton = document.getElementById("beginButton");
    const playAgainButton = document.getElementById("playAgainButton");
    const restartButton = document.getElementById("restartButton");
    const controlsButton = document.getElementById("controlsButton");
    const fullscreenButton = document.getElementById("fullscreenButton");
    const controlsModal = document.getElementById("controlsModal");
    const closeControlsButton = document.getElementById("closeControlsButton");

    aestheticButton.addEventListener("click", () => {
      document.body.classList.toggle("aesthetic-mode");
    });

    controlsButton.addEventListener("click", () => {
      controlsModal.classList.remove("hidden");
    });

    closeControlsButton.addEventListener("click", () => {
      controlsModal.classList.add("hidden");
    });

    fullscreenButton.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        gameSection.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    const canvas = document.getElementById("tetris");
    const context = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    context.scale(20, 20);

    const arena = createMatrix(12, 20);

    const player = {
      pos: { x: 0, y: 0 },
      matrix: null,
      score: 0
    };

    let gameStarted = false;
    let gameOver = false;
    let dropCounter = 0;
    let dropInterval = 700;
    let lastTime = 0;

    function createMatrix(width, height) {
      const matrix = [];
      while (height--) matrix.push(new Array(width).fill(0));
      return matrix;
    }

    function createPiece(type) {
      if (type === "T") return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
      if (type === "O") return [[2, 2], [2, 2]];
      if (type === "L") return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
      if (type === "J") return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
      if (type === "I") return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
      if (type === "S") return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
      if (type === "Z") return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
    }

    function collide(arena, player) {
      const matrix = player.matrix;
      const offset = player.pos;

      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < matrix[y].length; x++) {
          if (
            matrix[y][x] !== 0 &&
            (arena[y + offset.y] && arena[y + offset.y][x + offset.x]) !== 0
          ) {
            return true;
          }
        }
      }

      return false;
    }

    function merge(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function rotate(matrix, direction) {
      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < y; x++) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }

      if (direction > 0) matrix.forEach(row => row.reverse());
      else matrix.reverse();
    }

    function playerRotate(direction) {
      if (!gameStarted || gameOver) return;

      const position = player.pos.x;
      let offset = 1;

      rotate(player.matrix, direction);

      while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));

        if (offset > player.matrix[0].length) {
          rotate(player.matrix, -direction);
          player.pos.x = position;
          return;
        }
      }
    }

    function playerMove(direction) {
      if (!gameStarted || gameOver) return;

      player.pos.x += direction;

      if (collide(arena, player)) {
        player.pos.x -= direction;
      }
    }

    function lockPiece(impactType) {
      merge(arena, player);

      if (impactType) {
        triggerImpact(impactType);
      }

      playerReset();

      const clearedLines = arenaSweep();

      if (clearedLines > 0) {
        triggerImpact("big");
      }

      updateScore();
    }

    function playerDrop(isManual = false) {
      if (!gameStarted || gameOver) return;

      player.pos.y++;

      if (collide(arena, player)) {
        player.pos.y--;
        lockPiece(isManual ? "small" : null);
      }

      dropCounter = 0;
    }

    function playerHardDrop() {
      if (!gameStarted || gameOver) return;

      while (!collide(arena, player)) {
        player.pos.y++;
      }

      player.pos.y--;
      lockPiece("small");
      dropCounter = 0;
    }

    function playerReset() {
      const pieces = "TJLOSZI";
      player.matrix = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
      player.pos.y = 0;
      player.pos.x =
        Math.floor(arena[0].length / 2) -
        Math.floor(player.matrix[0].length / 2);

      if (collide(arena, player)) {
        endGame();
      }
    }

    function arenaSweep() {
      let rowCount = 1;
      let clearedLines = 0;

      outer: for (let y = arena.length - 1; y >= 0; y--) {
        for (let x = 0; x < arena[y].length; x++) {
          if (arena[y][x] === 0) continue outer;
        }

        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        y++;

        clearedLines++;
        player.score += rowCount * 10;
        rowCount *= 2;
      }

      return clearedLines;
    }

    function triggerImpact(type) {
      const className = type === "big" ? "impact-big" : "impact-small";

      gameBoard.classList.remove("impact-big", "impact-small");
      void gameBoard.offsetWidth;
      gameBoard.classList.add(className);

      setTimeout(() => {
        gameBoard.classList.remove(className);
      }, type === "big" ? 260 : 180);
    }

    function drawMatrix(matrix, offset) {
      if (!matrix) return;

      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            context.fillStyle = getComputedStyle(document.body).color;
            context.fillRect(x + offset.x, y + offset.y, 1, 1);
          }
        });
      });
    }

    function drawGrid() {
      context.strokeStyle = getComputedStyle(document.body).color;
      context.lineWidth = 0.03;

      for (let x = 0; x < 12; x++) {
        for (let y = 0; y < 20; y++) {
          context.strokeRect(x, y, 1, 1);
        }
      }
    }

    function draw() {
      context.fillStyle = getComputedStyle(document.body).backgroundColor;
      context.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawMatrix(arena, { x: 0, y: 0 });

      if (gameStarted && !gameOver) {
        drawMatrix(player.matrix, player.pos);
      }
    }

    function updateScore() {
      scoreElement.innerText = player.score;
    }

    function startGame() {
      arena.forEach(row => row.fill(0));
      player.score = 0;
      updateScore();

      gameStarted = true;
      gameOver = false;
      dropCounter = 0;
      lastTime = 0;

      startScreen.classList.add("hidden");
      gameOverScreen.classList.add("hidden");

      playerReset();
      draw();
    }

    function restartGame() {
      startGame();
    }

    function endGame() {
      gameOver = true;
      gameStarted = false;
      gameOverScreen.classList.remove("hidden");
      triggerImpact("big");
    }

    function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;

      if (gameStarted && !gameOver) {
        dropCounter += deltaTime;

        if (dropCounter > dropInterval) {
          playerDrop(false);
        }
      }

      draw();
      requestAnimationFrame(update);
    }

    document.addEventListener("keydown", event => {
      const gameKeys = ["ArrowLeft", "ArrowRight", "ArrowDown", "ArrowUp", "Space"];

      if (gameStarted && gameKeys.includes(event.code)) {
        event.preventDefault();
      }

      if (event.key === "Escape") {
        controlsModal.classList.add("hidden");
      }

      if (event.key === "ArrowLeft") playerMove(-1);
      if (event.key === "ArrowRight") playerMove(1);
      if (event.key === "ArrowDown") playerDrop(true);
      if (event.key === "ArrowUp") playerRotate(1);

      if (event.code === "Space") {
        event.preventDefault();
        playerHardDrop();
      }

      if (event.key.toLowerCase() === "r" && gameStarted) {
        restartGame();
      }
    });

    beginButton.addEventListener("click", startGame);
    playAgainButton.addEventListener("click", startGame);
    restartButton.addEventListener("click", restartGame);

    draw();
    update();
  </script>
</body>
</html>
