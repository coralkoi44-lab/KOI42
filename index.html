<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #FFB84E;
      color: #1B1A1B;
      font-family: "Plus Jakarta Sans", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.aesthetic-mode {
      background: #1B1A1B;
      color: #FFB84E;
    }

    button {
      position: fixed;
      top: 24px;
      left: 24px;
      background: transparent;
      color: inherit;
      border: 2px solid currentColor;
      padding: 12px 18px;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800;
      cursor: pointer;
    }

    h1 {
      font-size: clamp(48px, 10vw, 120px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: -0.06em;
    }

    p {
      margin-top: 24px;
      font-family: "Space Mono", monospace;
      font-size: clamp(16px, 2vw, 24px);
    }
  </style>
</head>

<body>
  <button id="aestheticButton">AESTHETICS</button>

  <main>
    <h1>welcome to my website</h1>
    <p>yup this is it the website.</p>
  </main>

  <script>
    const button = document.getElementById("aestheticButton");

    button.addEventListener("click", () => {
      document.body.classList.toggle("aesthetic-mode");
    });
  </script>
</body>
</html>
