<!DOCTYPE html>
<html>
  <head>
    <title>Font Considerations</title>

    <link href="https://fonts.googleapis.com/css2?family=Arvo&family=Badeen+Display&family=Palette+Mosaic&family=Syne+Mono&family=Plus+Jakarta+Sans&family=Instrument+Sans&family=Sora&family=Space+Mono&display=swap" rel="stylesheet">

    <style>
body {
  margin: 0;
  min-height: 100vh;
  background: #FFB84E;
  color: #1B1A1B;
  padding: 64px;
}

.font-list {
  display: flex;
  flex-direction: column;
  gap: 42px;
}

.font-sample {
  font-size: 56px;
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.02em;
}

/* Fonts */

.badeen {
  font-family: "Badeen Display", cursive;
  font-weight: 400; /* Badeen only comes in one weight */
}

.palette {
  font-family: "Palette Mosaic", cursive;
  font-weight: 400; /* Fixed weight */
}

.arvo {
  font-family: "Arvo", serif;
  font-weight: 700;
}

.syne {
  font-family: "Syne Mono", monospace;
  font-weight: 700;
}

.jakarta {
  font-family: "Plus Jakarta Sans", sans-serif;
  font-weight: 800;
}

.instrument {
  font-family: "Instrument Sans", sans-serif;
  font-weight: 700;
}

.sora {
  font-family: "Sora", sans-serif;
  font-weight: 700;
}

.space {
  font-family: "Space Mono", monospace;
  font-weight: 700;
}
    </main>
  </body>
</html>
