<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Website</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Mono&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <button id="aestheticButton">AESTHETICS</button>

  <section class="hero">
    <main>
      <h1>welcome to my website</h1>
      <p>yup this is it the website.</p>
    </main>
  </section>

  <section class="game-section" id="gameSection">

    <h2>tetris zone</h2>

    <div class="game-wrap">

      <div class="game-board" id="gameBoard">

        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="overlay" id="startScreen">
          <div class="overlay-box">
            <div class="overlay-title">ready?</div>
            <div class="overlay-text">
              click begin game to start
            </div>
            <button id="beginButton">
              BEGIN GAME
            </button>
          </div>
        </div>

        <div class="overlay hidden" id="gameOverScreen">
          <div class="overlay-box">
            <div class="overlay-title">game over</div>
            <div class="overlay-text">
              the blocks have won. tragic.
            </div>
            <button id="playAgainButton">
              PLAY AGAIN
            </button>
          </div>
        </div>

      </div>

<div class="panel">

  <div class="score">
    score:
    <span id="score">0</span>
  </div>

  <div class="next-piece-panel">
    <div class="next-piece-title">next</div>
    <canvas id="nextPiece" width="120" height="120"></canvas>
  </div>

  <div class="side-buttons">
    <button id="controlsButton">CONTROLS</button>
    <button id="fullscreenButton">FULLSCREEN</button>
    <button id="restartButton">RESTART</button>
  </div>

</div>
    </div>

  </section>

  <div class="controls-modal hidden" id="controlsModal">

    <div class="controls-box">

      <h3>controls</h3>

      <p>
        ← → move<br>
        ↓ soft drop<br>
        ↑ rotate<br>
        space hard drop<br>
        R restart<br>
        ESC close this screen
      </p>

      <button id="closeControlsButton">
        CLOSE
      </button>

    </div>

  </div>

  <script type="module" src="main.js"></script>

</body>

</html>
