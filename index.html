<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #FFB84E;
      --charcoal: #1B1A1B;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--orange);
      color: var(--charcoal);
      font-family: "Plus Jakarta Sans", sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.aesthetic-mode {
      background: var(--charcoal);
      color: var(--orange);
    }

    button {
      background: transparent;
      color: inherit;
      border: 2px solid currentColor;
      padding: 12px 18px;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800;
      cursor: pointer;
    }

    #aestheticButton {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
    }

    h1 {
      font-size: clamp(48px, 10vw, 120px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: -0.06em;
    }

    p {
      margin-top: 24px;
      font-family: "Space Mono", monospace;
      font-size: clamp(16px, 2vw, 24px);
    }

    .game-section {
      min-height: 100vh;
      padding: 80px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-top: 2px solid currentColor;
    }

    .game-section h2 {
      font-size: clamp(40px, 8vw, 96px);
      margin: 0 0 24px;
      letter-spacing: -0.05em;
    }

    .game-wrap {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    canvas {
      border: 3px solid currentColor;
      background: rgba(255, 255, 255, 0.08);
    }

    .panel {
      font-family: "Space Mono", monospace;
      font-size: 16px;
      max-width: 260px;
      line-height: 1.5;
    }

    .score {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 34px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <button id="aestheticButton">AESTHETICS</button>

  <section class="hero">
    <main>
      <h1>welcome to my website</h1>
      <p>yup this is it the website.</p>
    </main>
  </section>

  <section class="game-section">
    <h2>tetris zone</h2>

    <div class="game-wrap">
      <canvas id="tetris" width="240" height="400"></canvas>

      <div class="panel">
        <div class="score">score: <span id="score">0</span></div>
        <p>
          controls:<br>
          ← → move<br>
          ↓ soft drop<br>
          ↑ rotate<br>
          space hard drop<br>
          R restart
        </p>
        <button id="restartButton">RESTART</button>
      </div>
    </div>
  </section>

  <script>
    const aestheticButton = document.getElementById("aestheticButton");

    aestheticButton.addEventListener("click", () => {
      document.body.classList.toggle("aesthetic-mode");
    });

    const canvas = document.getElementById("tetris");
    const context = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const restartButton = document.getElementById("restartButton");

    context.scale(20, 20);

    const arena = createMatrix(12, 20);

    const player = {
      pos: { x: 0, y: 0 },
      matrix: null,
      score: 0
    };

    function createMatrix(width, height) {
      const matrix = [];
      while (height--) {
        matrix.push(new Array(width).fill(0));
      }
      return matrix;
    }

    function createPiece(type) {
      if (type === "T") return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
      if (type === "O") return [[2, 2], [2, 2]];
      if (type === "L") return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
      if (type === "J") return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
      if (type === "I") return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
      if (type === "S") return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
      if (type === "Z") return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
    }

    function collide(arena, player) {
      const matrix = player.matrix;
      const offset = player.pos;

      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < matrix[y].length; x++) {
          if (
            matrix[y][x] !== 0 &&
            (arena[y + offset.y] && arena[y + offset.y][x + offset.x]) !== 0
          ) {
            return true;
          }
        }
      }

      return false;
    }

    function merge(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function rotate(matrix, direction) {
      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < y; x++) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }

      if (direction > 0) {
        matrix.forEach(row => row.reverse());
      } else {
        matrix.reverse();
      }
    }

    function playerRotate(direction) {
      const position = player.pos.x;
      let offset = 1;

      rotate(player.matrix, direction);

      while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));

        if (offset > player.matrix[0].length) {
          rotate(player.matrix, -direction);
          player.pos.x = position;
          return;
        }
      }
    }

    function playerDrop() {
      player.pos.y++;

      if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
      }

      dropCounter = 0;
    }

    function playerHardDrop() {
      while (!collide(arena, player)) {
        player.pos.y++;
      }

      player.pos.y--;
      merge(arena, player);
      playerReset();
      arenaSweep();
      updateScore();
      dropCounter = 0;
    }

    function playerMove(direction) {
      player.pos.x += direction;

      if (collide(arena, player)) {
        player.pos.x -= direction;
      }
    }

    function playerReset() {
      const pieces = "TJLOSZI";
      player.matrix = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
      player.pos.y = 0;
      player.pos.x = Math.floor(arena[0].length / 2) - Math.floor(player.matrix[0].length / 2);

      if (collide(arena, player)) {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        updateScore();
      }
    }

    function arenaSweep() {
      let rowCount = 1;

      outer: for (let y = arena.length - 1; y >= 0; y--) {
        for (let x = 0; x < arena[y].length; x++) {
          if (arena[y][x] === 0) {
            continue outer;
          }
        }

        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        y++;

        player.score += rowCount * 10;
        rowCount *= 2;
      }
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            context.fillStyle = getComputedStyle(document.body).color;
            context.fillRect(x + offset.x, y + offset.y, 1, 1);
          }
        });
      });
    }

    function drawGrid() {
      context.strokeStyle = getComputedStyle(document.body).color;
      context.lineWidth = 0.03;

      for (let x = 0; x < 12; x++) {
        for (let y = 0; y < 20; y++) {
          context.strokeRect(x, y, 1, 1);
        }
      }
    }

    function draw() {
      context.fillStyle = getComputedStyle(document.body).backgroundColor;
      context.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawMatrix(arena, { x: 0, y: 0 });
      drawMatrix(player.matrix, player.pos);
    }

    function updateScore() {
      scoreElement.innerText = player.score;
    }

    let dropCounter = 0;
    let dropInterval = 700;
    let lastTime = 0;

    function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;

      dropCounter += deltaTime;

      if (dropCounter > dropInterval) {
        playerDrop();
      }

      draw();
      requestAnimationFrame(update);
    }

    document.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") playerMove(-1);
      if (event.key === "ArrowRight") playerMove(1);
      if (event.key === "ArrowDown") playerDrop();
      if (event.key === "ArrowUp") playerRotate(1);
      if (event.code === "Space") {
        event.preventDefault();
        playerHardDrop();
      }
      if (event.key.toLowerCase() === "r") restartGame();
    });

    function restartGame() {
      arena.forEach(row => row.fill(0));
      player.score = 0;
      updateScore();
      playerReset();
    }

    restartButton.addEventListener("click", restartGame);

    playerReset();
    updateScore();
    update();
  </script>
</body>
</html>
